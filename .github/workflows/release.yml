name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  LIBPGS_REPO: matthane/libpgs

jobs:
  resolve-libpgs:
    name: Resolve libpgs version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get latest libpgs release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh api repos/${{ env.LIBPGS_REPO }}/releases/latest --jq '.tag_name')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved libpgs tag: $tag"

  build:
    name: Build (${{ matrix.name }})
    needs: resolve-libpgs
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            libpgs_bin: libpgs.exe
            archive_ext: zip
            plat_tag: win_amd64
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            libpgs_bin: libpgs
            archive_ext: tar.gz
            plat_tag: manylinux_2_17_x86_64
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            libpgs_bin: libpgs
            archive_ext: tar.gz
            plat_tag: macosx_11_0_x86_64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            libpgs_bin: libpgs
            archive_ext: tar.gz
            plat_tag: macosx_11_0_arm64

    steps:
      - name: Checkout ProofPGS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Checkout libpgs source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ env.LIBPGS_REPO }}
          ref: ${{ needs.resolve-libpgs.outputs.tag }}
          path: _libpgs_src

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build libpgs from source
        working-directory: _libpgs_src
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy libpgs binary into ProofPGS
        shell: bash
        run: |
          cp "_libpgs_src/target/${{ matrix.target }}/release/${{ matrix.libpgs_bin }}" \
             "proofpgs/bin/${{ matrix.libpgs_bin }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build platform wheel
        shell: bash
        run: |
          pip install build wheel
          python -m build --wheel --outdir dist/
          python -m wheel tags --platform-tag ${{ matrix.plat_tag }} dist/proofpgs-*.whl
          rm -f dist/proofpgs-*-any.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/proofpgs-*.whl

      - name: Read ProofPGS version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' proofpgs/__init__.py)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Record libpgs provenance
        shell: bash
        run: |
          cd _libpgs_src
          echo "libpgs_tag=${{ needs.resolve-libpgs.outputs.tag }}" >  ../BUILD_INFO.txt
          echo "libpgs_commit=$(git rev-parse HEAD)"                >> ../BUILD_INFO.txt
          echo "libpgs_repo=https://github.com/${{ env.LIBPGS_REPO }}" >> ../BUILD_INFO.txt
          echo "proofpgs_ref=${{ github.sha }}"                     >> ../BUILD_INFO.txt
          echo "build_runner=${{ matrix.os }}"                      >> ../BUILD_INFO.txt
          echo "build_target=${{ matrix.target }}"                  >> ../BUILD_INFO.txt
          echo "workflow_run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> ../BUILD_INFO.txt

      - name: Stage release directory
        shell: bash
        run: |
          pkg="ProofPGS-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir "$pkg"

          # Copy application files
          cp -r proofpgs "$pkg/"
          cp LICENSE.txt "$pkg/"
          cp README.md   "$pkg/"
          cp -r LICENSES "$pkg/"
          cp BUILD_INFO.txt "$pkg/"

          # Clean up files not needed in the release
          rm -rf "$pkg/proofpgs/__pycache__"
          rm -rf "$pkg/proofpgs/bin/.gitkeep"

          echo "$pkg" > _pkg_name.txt

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          pkg=$(cat _pkg_name.txt)
          7z a "${pkg}.zip" "$pkg"

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          pkg=$(cat _pkg_name.txt)
          tar czf "${pkg}.tar.gz" "$pkg"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            ProofPGS-${{ steps.version.outputs.version }}-${{ matrix.name }}.${{ matrix.archive_ext }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          pkg=$(cat _pkg_name.txt)
          gh release upload "${{ github.event.release.tag_name }}" \
            "${pkg}.${{ matrix.archive_ext }}" \
            --clobber

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/proofpgs
    permissions:
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
